{% extends "base.html" %}
{% block title %}Server Error — WLV — University of Wolverhampton{% endblock %}
{% block content %}
<main>

    <div style="font-size:64px;margin-bottom:16px;">⚠️</div>

    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
