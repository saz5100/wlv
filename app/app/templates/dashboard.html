<!DOCTYPE html>
<html><head><meta charset=utf-8><title>{{ title }}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;color:#e2e8f0;font:14px/1.5 -apple-system,sans-serif;padding:24px;max-width:1100px;margin:0 auto}
h1{color:#22d3ee;font-size:22px;margin-bottom:4px}
.sub{color:#64748b;font-size:13px;margin-bottom:16px}
h2{font-size:16px;color:#e2e8f0;margin-bottom:12px;margin-top:24px}
h2:first-of-type{margin-top:0}
.nav-link{color:#64748b;font-size:12px;text-decoration:none;margin-right:16px}
.nav-link:hover{color:#22d3ee}
.nav-link.danger{color:#f87171}
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.filter-bar select{background:rgba(255,255,255,0.06);color:#e2e8f0;border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:6px 10px;font-size:13px}
.filter-bar select:focus{outline:none;border-color:#22d3ee}
.dev-table{width:100%;border-collapse:collapse;margin-top:8px}
.dev-table th{text-align:left;padding:8px;font-size:11px;color:#64748b;border-bottom:1px solid rgba(255,255,255,0.08);font-weight:600}
.dev-table td{padding:8px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.04)}
.dev-table .dev{color:#22d3ee;font-family:monospace;font-size:13px;cursor:pointer;text-decoration:none}
.dev-table .dev:hover{text-decoration:underline}
.dev-table .last{color:#64748b;font-size:11px}
.dev-table .ip-cell{color:#64748b;font-family:monospace;font-size:11px}
.dev-table .rename-inline{background:none;border:none;color:#64748b;cursor:pointer;font-size:13px;padding:0 4px}
.dev-table .rename-inline:hover{color:#22d3ee}
.empty{color:#64748b;text-align:center;padding:24px}
</style></head>
<body>
<div style="margin-bottom:16px;display:flex;align-items:center;gap:4px;flex-wrap:wrap">
<a href="/log/raw" class="nav-link">📄 Raw Log</a>
<a href="/log" class="nav-link">🎨 Colourised Log</a>
<a href="/activity" class="nav-link" style="color:#22d3ee;font-weight:600">📊 Dashboard</a>
<button onclick="clearLog()" class="nav-link danger" style="background:none;border:none;cursor:pointer;margin-left:auto">🗑️ Clear Log</button>
</div>
<script>
function clearLog(){if(!confirm("Clear all activity log entries?"))return;fetch("/activity/clear",{method:"POST"}).then(r=>r.json()).then(d=>{if(d.status==="ok")location.reload();else alert("Error: "+d.message)})}
</script>
<h1>{{ title }}</h1>
<div class="sub">{{ total_devices }} device{% if total_devices != 1 %}s{% endif %}</div>

<div class="filter-bar">
<form method="get" action="/activity">
<select name="device" onchange="this.form.submit()">
{{ filter_opts }}
</select>
</form>
</div>

<h2>👤 Devices / Users</h2>
{{ device_table }}
</body></html>
