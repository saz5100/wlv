<!DOCTYPE html>
<html><head><meta charset=utf-8><title>Activity Log</title>
<style>
body{background:#0a0e1a;color:#e2e8f0;font:13px/1.5 monospace;padding:20px;max-width:1200px;margin:0 auto}
.line{padding:3px 8px;border-bottom:1px solid rgba(255,255,255,0.04);white-space:pre-wrap;word-break:break-all}
.line:hover{background:rgba(255,255,255,0.03)}
h1{color:#22d3ee;font:700 20px sans-serif;margin-bottom:4px}
.sub{color:#64748b;font:12px monospace;margin-bottom:16px}
.tag{display:inline-block;padding:0 6px;border-radius:3px;font-size:11px;font-weight:600;margin-right:4px}
.tag-lesson{background:rgba(34,211,238,0.15);color:#22d3ee}
.tag-quiz{background:rgba(129,140,248,0.15);color:#818cf8}
.tag-exam{background:rgba(250,204,21,0.15);color:#facc15}
.tag-tutor{background:rgba(52,211,153,0.15);color:#34d399}
.tag-codelab{background:rgba(168,85,247,0.15);color:#a855f7}
</style>
</head>
<body>
<h1>Activity Log</h1>
<div class="sub">{{ total }} total - showing last {{ showing }}</div>
{{ rows }}
</body>
</html>
