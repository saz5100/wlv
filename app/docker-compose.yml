services:
  db:
    image: postgres:16
    container_name: wlvcs-db
    environment:
      POSTGRES_DB: wlv_kb
      POSTGRES_USER: wlv_app
      POSTGRES_PASSWORD: wlv_kb_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wlv_app -d wlv_kb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    container_name: wlvcs-app
    ports:
      - "8001:8001"
    environment:
      WLV_PG_DSN: "dbname=wlv_kb user=wlv_app password=wlv_kb_2026 host=db port=5432 client_encoding=utf8"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"
      OLLAMA_API_KEY: "${OLLAMA_API_KEY}"
      OLLAMA_CLOUD_API_KEY: "${OLLAMA_CLOUD_API_KEY}"
      OLLAMA_CLOUD_BASE_URL: "${OLLAMA_CLOUD_BASE_URL:-https://ollama.com/v1}"
      OLLAMA_CLOUD_MODEL: "${OLLAMA_CLOUD_MODEL:-deepseek-v4-flash}"
    volumes:
      - activity-logs:/var/log/activity
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
    name: wlv-cs-website_pgdata
    external: true
  activity-logs:
    name: wlv-cs-website_activity-logs
    external: true